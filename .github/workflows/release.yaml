name: Build and Release Master

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: scrcpy-rfb-master-release
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build builder image (cached FFmpeg layer)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.builder
          platforms: ${{ matrix.platform }}
          load: true
          tags: scrcpy-rfb-builder:${{ matrix.arch }}
          build-args: |
            UBUNTU_PORTS_MIRROR=http://mirror.us.leaseweb.net/ubuntu-ports
          cache-from: type=gha,scope=builder-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=builder-${{ matrix.arch }}

      - name: Build Ubuntu 22.04 binary
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "$PWD:/src" \
            "scrcpy-rfb-builder:${{ matrix.arch }}"

      - name: Verify artifact architecture and dependencies
        run: |
          artifact="dist/scrcpy-rfb-linux-${{ matrix.arch }}"
          file "$artifact"
          test -x "$artifact"
          grep -F "scrcpy-rfb-linux-${{ matrix.arch }}" "$artifact.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: scrcpy-rfb-linux-${{ matrix.arch }}
          path: |
            dist/scrcpy-rfb-linux-${{ matrix.arch }}
            dist/scrcpy-rfb-linux-${{ matrix.arch }}.sha256

  release:
    name: Update master prerelease
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: scrcpy-rfb-linux-*
          path: dist
          merge-multiple: true

      - name: Generate build metadata
        run: |
          ffmpeg_commit=$(sed -n 's/^ARG FFMPEG_COMMIT=//p' docker/Dockerfile.builder)
          cat > dist/build-info.json <<EOF
          {
            "ref": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "workflow": "${GITHUB_WORKFLOW}",
            "ffmpeg_commit": "${ffmpeg_commit}"
          }
          EOF

      - name: Create master release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: master
          target_commitish: ${{ github.sha }}
          name: Master Build
          body: |
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Workflow Run: `${{ github.run_id }}`
          files: |
            dist/scrcpy-rfb-linux-amd64
            dist/scrcpy-rfb-linux-amd64.sha256
            dist/scrcpy-rfb-linux-arm64
            dist/scrcpy-rfb-linux-arm64.sha256
            dist/build-info.json
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move master tag to current commit
        run: |
          git tag -f master "${GITHUB_SHA}"
          git push origin refs/tags/master --force

  docker:
    name: Push container image
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: scrcpy-rfb-linux-*
          path: dist
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist/scrcpy-rfb-linux-*

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            UBUNTU_PORTS_MIRROR=http://mirror.us.leaseweb.net/ubuntu-ports
          tags: |
            ghcr.io/${{ github.repository }}:master
            ghcr.io/${{ github.repository }}:${{ github.sha }}
